name: Scrape BBB Reviews

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday at 8:00 AM UTC
  workflow_dispatch:       # Also allows you to run it manually from GitHub

permissions:
  contents: write          # Allows the workflow to commit and push

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Suppress Node.js warning

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          WEBSCRAPING_AI_KEY: ${{ secrets.WEBSCRAPING_AI_KEY }}
        run: python scrape_bbb_reviews.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bbb_reviews.json
          git diff --cached --quiet || git commit -m "Update BBB reviews data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
